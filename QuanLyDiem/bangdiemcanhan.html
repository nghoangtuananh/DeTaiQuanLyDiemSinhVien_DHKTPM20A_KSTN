<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điểm Sinh Viên - Quản Lý Điểm</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/bangdiem.css">
</head>

<body>
    <!-- ============ SIDEBAR ============ -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo-wrapper">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h4>Bảng Điểm Sinh Viên</h4>
            <p id="studentNameDisplay" class="text-light"></p>
            <p id="studentIdDisplay" class="text-light"></p>
        </div>

        <ul class="sidebar-nav">
            <li class="nav-item active">
                <a href="bangdiemcanhan.html">
                    <i class="bi bi-table"></i>
                    <span>Bảng Điểm</span>
                </a>
            </li>

            <li class="nav-item">
                <a href="tintucsinhvien.html">
                    <i class="bi bi-newspaper"></i>
                    <span>Tin Tức - Sự Kiện</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="gioithieuthanhvien.html">
                    <i class="bi bi-people-fill"></i>
                    <span>Giới thiệu thành viên</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="sitemap.html">
                    <i class="bi bi-diagram-3-fill"></i>
                    <span>SiteMap</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <a href="taikhoansinhvien.html" class="user-info active" role="button" title="Thông tin tài khoản">
                <div class="avatar">
                    <i class="bi bi-person-circle"></i>
                </div>
                <div class="user-detail">
                    <span class="user-name" id="sidebarStudentName">Sinh Viên</span>
                    <span class="user-role" id="profileMssv">
                        MSSV
                    </span>
                </div>
                <div class="user-chevron">
                    <i class="bi bi-chevron-right"></i>
                </div>
            </a>
        </div>
    </nav>

    <!-- ============ TOGGLE BUTTON (Mobile) ============ -->
    <button class="sidebar-toggle" id="sidebarToggle">
        <i class="bi bi-list"></i>
    </button>

    <!-- ============ MAIN CONTENT ============ -->
    <main class="main-content" id="mainContent">


        <!-- Grade Table -->
        <div class="card grade-table-card">

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover grade-table mb-0" id="gradeTable">
                        <thead>
                            <tr class="header-row-1">
                                <th rowspan="2" class="th-stt">STT</th>
                                <th rowspan="2" class="th-mssv">Tên môn học</th>
                                <th rowspan="2" class="th-single">Số TC</th>
                                <th colspan="3" class="th-group">Điểm Thường Xuyên</th>
                                <th colspan="3" class="th-group">Điểm Thực Hành</th>
                                <th rowspan="2" class="th-single">Giữa Kỳ</th>
                                <th rowspan="2" class="th-single">Cuối Kỳ</th>
                                <th rowspan="2" class="th-single th-highlight">Tổng Kết<br><small>(Thang 10)</small>
                                </th>
                                <th rowspan="2" class="th-single">Thang 4</th>
                                <th rowspan="2" class="th-single">Điểm Chữ</th>
                                <th rowspan="2" class="th-single">Xếp Loại</th>
                                <th rowspan="2" class="th-note">Ghi Chú</th>
                                <th rowspan="2" class="th-pass">Đạt</th>
                            </tr>
                            <tr class="header-row-2">
                                <th class="th-sub">TX1</th>
                                <th class="th-sub">TX2</th>
                                <th class="th-sub">TX3</th>
                                <th class="th-sub">TH1</th>
                                <th class="th-sub">TH2</th>
                                <th class="th-sub">TH3</th>
                            </tr>
                        </thead>
                        <tbody id="gradeTableBody">
                            <!-- Data rendered by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- ============ TOAST NOTIFICATION ============ -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
        <div id="toastNotify" class="toast align-items-center text-bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage">
                    Thao tác thành công!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Custom JS -->
    <script src="js/common.js"></script>
    <!-- Bảng điểm cá nhân JS - Xử lý hiển thị điểm sinh viên (xem file js/bangdiemcanhan.js) -->
    <script src="js/bangdiemcanhan.js"></script>
</body>

</html>
