<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng Nhập - Quản Lý Điểm Sinh Viên</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/login.css" />
</head>



<body>
  <div class="login-container">
    <!-- Header -->
    <div class="login-header">
      <div class="logo">
        <i class="bi bi-mortarboard-fill"></i>
      </div>
      <h1>Quản Lý Điểm Sinh Viên</h1>
    </div>

    <!-- Body -->
    <div class="login-body">
      <!-- Alert message -->
      <div id="alertMessage" class="alert alert-danger d-none" role="alert">
        <i class="bi bi-exclamation-circle me-1"></i>
        <span id="alertText"></span>
      </div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">
            <i class="bi bi-person-badge"></i>
            Mã giảng viên / MSSV
          </label>
          <input type="text" class="form-control" id="teacherId" placeholder="Nhập mã giảng viên hoặc MSSV" required
            autofocus />
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="bi bi-lock"></i>
            Mật khẩu
          </label>
          <div class="password-toggle">
            <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" required />
            <i class="bi bi-eye toggle-icon" id="togglePassword"></i>
          </div>
        </div>

        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right"></i>
          Đăng Nhập
        </button>
      </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Login JS - Xử lý logic đăng nhập (xem file js/login.js) -->
  <script src="js/login.js"></script>
</body>

</html>
